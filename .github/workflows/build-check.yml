name: Build check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build theme
        run: npm run build

      - name: Validate theme contract
        run: npm test

      - name: Verify committed theme artifact
        run: git diff --exit-code -- theme.css
