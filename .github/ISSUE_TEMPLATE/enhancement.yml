name: Enhancement Suggestion
description: I want to suggest improvements to Primary Simplified
labels: ["🧞‍♂️ enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest improvements to Primary Simplified! Before proceeding, check this repository's existing issues to avoid duplication.
  - type: input
    id: primary-version
    attributes:
      label: Primary Simplified Version
      description: What version of Primary Simplified are you using? Check `manifest.json` in the theme folder or the theme information shown under `Settings` → `Appearance` → `Themes`.
      placeholder: e.g. 26.6.0
    validations:
      required: true
  - type: textarea
    id: debug-info
    attributes:
      label: Debug Info
      description: Please paste the debug info below. To get the Debug Info, open up the Command Palette using `Cmd/Ctrl + P` and typing in `Show debug info`. A popup will open. Press `Copy to clipboard` and paste below.
    validations:
      required: true
  - type: textarea
    id: enhancement-suggestion
    attributes:
      label: Describe the enhancement
      description: Feel free to post in screenshots, links, etc. If it exists in other themes or apps, please provide links to those!
    validations:
      required: true
